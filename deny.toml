# cargo-deny configuration for the Alpe workspace.
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

# ─── Graph ────────────────────────────────────────────────────────────────────
[graph]
# Check all features to ensure full coverage
all-features = true

# ─── Advisories ──────────────────────────────────────────────────────────────
[advisories]
# Warn on unmaintained crates (only workspace-direct deps)
unmaintained = "workspace"
# Deny unsound crates everywhere
unsound = "all"
# Warn on yanked crates
yanked = "warn"

# ─── Licenses ────────────────────────────────────────────────────────────────
[licenses]
# Require high confidence for license detection
confidence-threshold = 0.93
# Warn on unused allowed licenses instead of noise
unused-allowed-license = "allow"

# Licenses we allow in the dependency tree
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

# Skip license checks on workspace members marked `publish = false`
[licenses.private]
ignore = true

# ─── Bans ─────────────────────────────────────────────────────────────────────
[bans]
# Warn on multiple versions of the same crate (deny is too strict early on)
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "deny"

# ─── Sources ──────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
# Do not allow git dependencies in production
unknown-git = "deny"
# Allow our own GitHub org
[sources.allow-org]
github = ["alpe-cloud"]
